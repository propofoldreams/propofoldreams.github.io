<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cello Intonation Tuner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.3/abcjs-basic-min.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>Cello Intonation Tuner</h1>
      <p>Master your pitch across all scales.</p>
    </header>

    <div id="setup-panel" class="panel glass-panel active">
      <h2>Practice Setup</h2>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="scale">Scale</button>
        <button class="mode-tab" data-mode="custom">Custom Notes</button>
      </div>

      <div id="scale-options" class="mode-section active">
        <div class="form-group">
        <label for="scale-root">Root Note</label>
        <select id="scale-root">
          <option value="C">C</option>
          <option value="C#">C# / Db</option>
          <option value="D">D</option>
          <option value="D#">D# / Eb</option>
          <option value="E">E</option>
          <option value="F">F</option>
          <option value="F#">F# / Gb</option>
          <option value="G">G</option>
          <option value="G#">G# / Ab</option>
          <option value="A">A</option>
          <option value="A#">A# / Bb</option>
          <option value="B">B</option>
        </select>
      </div>
      <div class="form-group">
        <label for="start-octave">Starting Octave</label>
        <select id="start-octave">
          <option value="2">Octave 2 (e.g., C2 - Cello Low String)</option>
          <option value="3" selected>Octave 3 (e.g., A3 - Cello Top String)</option>
          <option value="4">Octave 4 (Middle C is C4)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="scale-type">Type</label>
        <select id="scale-type">
          <option value="major">Major</option>
          <option value="minor">Minor (Melodic)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="scale-octaves">Octaves</label>
        <select id="scale-octaves">
          <option value="1">1 Octave</option>
          <option value="2">2 Octaves</option>
          <option value="3">3 Octaves</option>
        </select>
      </div>
      </div> <!-- End Scale Options -->

      <div id="custom-options" class="mode-section hidden">
        <div class="form-group">
          <label for="custom-notes-input">Custom Notes (e.g., A3 C#4 D4)</label>
          <textarea id="custom-notes-input" rows="3" placeholder="Enter space-separated notes...">C3 D3 E3 F3 G3 A3 B3 C4</textarea>
        </div>
      </div>

      <button id="start-btn" class="btn primary-btn">Generate & Start Tuning</button>
      <div id="mic-status" class="status-msg">Requires Microphone Access</div>
    </div>

    <div id="tuner-panel" class="panel glass-panel">
      <div class="top-controls">
        <button id="back-btn" class="btn secondary-btn">&larr; Back</button>
        <div class="current-scale-display" id="current-scale-display">C Major (2 Octaves)</div>
        <div class="personal-best-display" id="personal-best-display">Best: --%</div>
      </div>
      
      <div class="sheet-music-container">
        <div id="sheet-music"></div>
      </div>

      <div class="tuner-dashboard">
        <div class="pitch-visualizer">
          <div class="target-hz-label">Target: <span id="target-hz">--</span> Hz</div>
          
          <div class="tuner-dial-container">
            <div class="dial-marks">
              <span class="mark flat-mark">-25</span>
              <span class="mark center-mark">0</span>
              <span class="mark sharp-mark">+25</span>
            </div>
            <div class="tuner-bar-wrapper">
              <div id="tuner-needle" class="tuner-needle"></div>
            </div>
          </div>
          
          <div class="tuning-status">
            <div id="cents-display" class="cents-value">-- cents</div>
            <div id="status-label" class="status-label">Waiting to play</div>
          </div>
          <div class="volume-container">
            <div class="volume-label">🎤 Mic Level</div>
            <div class="volume-bar-wrapper">
              <div id="volume-level" class="volume-level"></div>
            </div>
          </div>
        </div>

        <div class="current-note-info">
          <div class="note-label">Detecting</div>
          <div id="current-played-note" class="detected-pitch">--</div>
          <div id="current-hz-display" class="current-hz">Input: -- Hz</div>
        </div>
      </div>

      <div id="play-again-container" class="play-again-container hidden">
        <button id="play-again-btn" class="btn primary-btn" style="width:100%; margin-top:0;">Play Again</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { PitchDetector } from "https://esm.sh/pitchy@4";

    // ABCJS in clef=bass visually maps "C," to C2, "C" to C3, "c" to C4
    // Wait, let's explicitly use absolute mapping that aligns with Cello.
    const chromaticSteps = [
      "C,,", "^C,,", "D,,", "^D,,", "E,,", "F,,", "^F,,", "G,,", "^G,,", "A,,", "^A,,", "B,,", // 0-11:  C2 - B2 (Lowest Cello Octave)
      "C,",  "^C,",  "D,",  "^D,",  "E,",  "F,",  "^F,",  "G,",  "^G,",  "A,",  "^A,",  "B,",  // 12-23: C3 - B3
      "C",   "^C",   "D",   "^D",   "E",   "F",   "^F",   "G",   "^G",   "A",   "^A",   "B",   // 24-35: C4 - B4 (Middle C is C)
      "c",   "^c",   "d",   "^d",   "e",   "f",   "^f",   "g",   "^g",   "a",   "^a",   "b",   // 36-47: C5 - B5
      "c'",  "^c'",  "d'",  "^d'",  "e'",  "f'",  "^f'",  "g'",  "^g'",  "a'",  "^a'",  "b'"   // 48-59: C6 - B6
    ];
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function generateScale(rootNoteName, type, octaves, startOctave) {
      // Base index 0 is C2.
      let rootIndexBase = noteNames.indexOf(rootNoteName);
      let startIndex = rootIndexBase + (startOctave - 2) * 12;
      
      const intervals = {
        "major": [2, 2, 1, 2, 2, 2, 1],
        "minor": [2, 1, 2, 2, 2, 2, 1]
      }[type];

      let currentStep = startIndex;
      let notes = [];
      let currentClef = startIndex >= 26 ? "treble" : "bass";
      let abcString = "";

      for (let o = 0; o < octaves; o++) {
        for (let i = 0; i < 7; i++) {
            let requiredClef = currentStep >= 26 ? "treble" : "bass";
            if (requiredClef !== currentClef) {
                abcString += `[K:C clef=${requiredClef}] `;
                currentClef = requiredClef;
            }
            notes.push(getNoteData(currentStep));
            abcString += chromaticSteps[currentStep] + " ";
            currentStep += intervals[i];
        }
      }
      
      let finalRequiredClef = currentStep >= 26 ? "treble" : "bass";
      if (finalRequiredClef !== currentClef) {
          abcString += `[K:C clef=${finalRequiredClef}] `;
          currentClef = finalRequiredClef;
      }
      
      notes.push(getNoteData(currentStep));
      abcString += chromaticSteps[currentStep];

      const typeStr = type === 'minor' ? 'm' : '';
      let initialClef = startIndex >= 26 ? "treble" : "bass";
      const fullAbc = `
X:1
T:${rootNoteName} ${type.charAt(0).toUpperCase() + type.slice(1)} Scale
M:4/4
L:1/4
K:C
V:1 clef=${initialClef}
${abcString} |]
      `.trim();

      return { abc: fullAbc, noteSequence: notes };
    }

    function getNoteData(stepIndex) {
      // stepIndex 0 is C2
      const midiNote = 36 + stepIndex;
      const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
      const name = noteNames[stepIndex % 12];
      return { abc: chromaticSteps[stepIndex], midi: midiNote, freq: freq, name: name };
    }

    function parseCustomNotes(inputStr) {
      const tokens = inputStr.trim().split(/\s+/);
      let notes = [];
      let abcString = "";
      let currentClef = "bass";
      
      for (const token of tokens) {
        const match = token.match(/^([A-Ga-g])([#b]?)([1-7])$/);
        if (!match) continue;
        
        let [_, noteChar, accidental, octaveStr] = match;
        noteChar = noteChar.toUpperCase();
        let octave = parseInt(octaveStr);
        
        let baseIndex = noteNames.indexOf(noteChar);
        if (accidental === '#') baseIndex += 1;
        if (accidental === 'b') baseIndex -= 1;
        
        if (baseIndex < 0) { baseIndex += 12; octave -= 1; }
        if (baseIndex > 11) { baseIndex -= 12; octave += 1; }
        
        let stepIndex = baseIndex + (octave - 2) * 12;
        if (stepIndex < 0 || stepIndex >= chromaticSteps.length) continue;
        
        let requiredClef = stepIndex >= 26 ? "treble" : "bass";
        if (requiredClef !== currentClef) {
           abcString += `[K:C clef=${requiredClef}] `;
           currentClef = requiredClef;
        }
        
        notes.push(getNoteData(stepIndex));
        abcString += chromaticSteps[stepIndex] + " ";
      }
      
      let initialClef = (notes.length > 0 && (notes[0].midi - 36) >= 26) ? "treble" : "bass";

      const fullAbc = `
X:1
T:Custom Practice
M:4/4
L:1/4
K:C
V:1 clef=${initialClef}
${abcString} |]
      `.trim();
      
      return { abc: fullAbc, noteSequence: notes };
    }

    // --- audio.js logic ---
    class AudioHandler {
      constructor(onPitchDetected) {
        this.onPitchDetected = onPitchDetected;
        this.audioContext = null;
        this.analyser = null;
        this.detector = null;
        this.inputArray = null;
        this.running = false;
        this.source = null;
      }

      async start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          this.analyser = this.audioContext.createAnalyser();
          this.analyser.fftSize = 2048;
          this.source = this.audioContext.createMediaStreamSource(stream);
          this.source.connect(this.analyser);
          this.detector = PitchDetector.forFloat32Array(this.analyser.fftSize);
          this.inputArray = new Float32Array(this.detector.inputLength);
          this.running = true;
          this.updatePitch();
          return true;
        } catch (err) {
          console.error("Microphone access:", err);
          return false;
        }
      }

      stop() {
        this.running = false;
        if (this.audioContext && this.audioContext.state !== 'closed') {
          this.audioContext.close();
        }
      }

      updatePitch = () => {
        if (!this.running) return;
        this.analyser.getFloatTimeDomainData(this.inputArray);
        
        let sumSquares = 0.0;
        for (let i = 0; i < this.inputArray.length; i++) {
          sumSquares += this.inputArray[i] * this.inputArray[i];
        }
        const rms = Math.sqrt(sumSquares / this.inputArray.length);
        const volumeValue = Math.min(1, rms * 6); // scale factor to make it visible
        
        const [pitch, clarity] = this.detector.findPitch(this.inputArray, this.audioContext.sampleRate);
        if (clarity > 0.7 && pitch > 50 && pitch < 1200) {
          this.onPitchDetected(pitch, clarity, volumeValue);
        } else {
           this.onPitchDetected(null, null, volumeValue);
        }
        requestAnimationFrame(this.updatePitch);
      }
    }

    function getCents(detectedHz, targetHz) {
      return Math.round(1200 * Math.log2(detectedHz / targetHz));
    }

    // --- scorer.js logic ---
    class Scorer {
      constructor(notes, uiCallbacks) {
        this.notes = notes;
        this.currentIndex = 0;
        this.ui = uiCallbacks;
        this.history = [];
        this.activeCentsBuffer = [];
        this.holdStartTime = 0;
        this.holdThresholdMs = 500; // note held for at least 500 ms
        this.toleranceCents = 100; // wider net for registering attempts
      }

      processPitch(detectedPitchFreq) {
        if (this.currentIndex >= this.notes.length) return;
        const targetNote = this.notes[this.currentIndex];
        
        if (!detectedPitchFreq) {
          this.resetHold();
          this.ui.onPitchLost();
          return;
        }

        const cents = getCents(detectedPitchFreq, targetNote.freq);
        if (Math.abs(cents) > this.toleranceCents) {
          this.resetHold();
          this.ui.onPitchLost();
          return;
        }

        this.activeCentsBuffer.push(cents);
        if (this.activeCentsBuffer.length > 5) this.activeCentsBuffer.shift();
        
        const avgCents = Math.round(this.activeCentsBuffer.reduce((a,b)=>a+b,0) / this.activeCentsBuffer.length);
        this.ui.onNoteUpdate(targetNote, avgCents);

        const now = Date.now();
        if (this.holdStartTime === 0) {
          this.holdStartTime = now;
        } else if (now - this.holdStartTime > this.holdThresholdMs) {
          this.lockNote(avgCents);
        }
      }

      resetHold() {
        this.holdStartTime = 0;
        this.activeCentsBuffer = [];
      }

      lockNote(finalCents) {
        let abs = Math.abs(finalCents);
        let s = 0;
        if (abs <= 20) {
          // 0 -> 100, 10 -> 85, 20 -> 70
          s = 100 - 1.5 * abs;
        } else if (abs <= 30) {
          // 20 -> 70, quickly decay down to 0 at 30 cents
          s = 70 - 7 * (abs - 20);
        }
        const score = Math.max(0, Math.round(s));
        this.history.push({ noteIndex: this.currentIndex, cents: finalCents, score: score });
        this.ui.onNoteLocked(this.currentIndex, finalCents, score);
        this.resetHold();
        this.currentIndex++;

        if (this.currentIndex >= this.notes.length) {
          this.ui.onCompletion(this.history);
        } else {
          setTimeout(() => {
            if (this.currentIndex < this.notes.length) {
              this.ui.onTargetChanged(this.notes[this.currentIndex]);
            }
          }, 500);
        }
      }
    }

    // --- main.js logic ---
    const setupPanel = document.getElementById("setup-panel");
    const tunerPanel = document.getElementById("tuner-panel");
    const startBtn = document.getElementById("start-btn");
    const backBtn = document.getElementById("back-btn");
    const micStatus = document.getElementById("mic-status");
    const targetHzEl = document.getElementById("target-hz");
    const centsDisplayEl = document.getElementById("cents-display");
    const statusLabelEl = document.getElementById("status-label");
    const needleEl = document.getElementById("tuner-needle");
    const detectedPitchEl = document.getElementById("current-played-note");
    const currentHzEl = document.getElementById("current-hz-display");
    const playAgainBtn = document.getElementById("play-again-btn");
    const playAgainContainer = document.getElementById("play-again-container");
    const pbDisplay = document.getElementById("personal-best-display");

    let audioHandler = null;
    let currentScorer = null;
    let currentMode = "scale";
    let activeNoteSequence = null;
    let activeAbc = null;
    let personalBest = 0;

    // Tab Switching Logic
    const modeTabs = document.querySelectorAll('.mode-tab');
    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        modeTabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
        
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        
        const section = document.getElementById(`${currentMode}-options`);
        section.classList.remove('hidden');
        section.classList.add('active');
      });
    });

    startBtn.addEventListener("click", async () => {
      let abc, noteSequence, displayTitle;

      if (currentMode === "scale") {
          const rootNote = document.getElementById("scale-root").value;
          const type = document.getElementById("scale-type").value;
          const startOctave = parseInt(document.getElementById("start-octave").value);
          const octaves = parseInt(document.getElementById("scale-octaves").value);
          const res = generateScale(rootNote, type, octaves, startOctave);
          abc = res.abc;
          noteSequence = res.noteSequence;
          displayTitle = `${rootNote} ${type} (${octaves} Octave${octaves>1?'s':''})`;
      } else {
          const rawInput = document.getElementById("custom-notes-input").value;
          const res = parseCustomNotes(rawInput);
          abc = res.abc;
          noteSequence = res.noteSequence;
          displayTitle = "Custom Sequence";
          if (noteSequence.length === 0) {
             alert("No valid notes found! Use format like 'C3 D3 F#4'.");
             return;
          }
      }
      
      personalBest = 0; // reset PB on fresh start
      pbDisplay.textContent = `Best: --%`;
      await launchPracticeSession(abc, noteSequence, displayTitle);
    });

    async function launchPracticeSession(abc, noteSequence, displayTitle) {
      activeAbc = abc;
      activeNoteSequence = noteSequence;
      
      playAgainContainer.classList.add("hidden");
      
      window.ABCJS.renderAbc("sheet-music", abc, { 
        responsive: "resize", 
        add_classes: true,
        foregroundColor: "#e6edf3"
      });
      
      document.getElementById("current-scale-display").textContent = displayTitle;

      micStatus.textContent = "Requesting microphone...";
      micStatus.style.color = "var(--text-primary)";
      
      if (!audioHandler) audioHandler = new AudioHandler(handlePitchDetection);
      
      const success = await audioHandler.start();
      if (success) {
        setupPanel.classList.remove("active");
        tunerPanel.classList.add("active");
        
        currentScorer = new Scorer(noteSequence, {
          onTargetChanged: (targetNote) => {
            targetHzEl.textContent = targetNote.freq.toFixed(1);
            statusLabelEl.textContent = `Awaiting ${targetNote.name}`;
          },
          onNoteUpdate: (targetNote, avgCents) => {
            centsDisplayEl.textContent = `${avgCents > 0 ? '+' : ''}${avgCents} cents`;
            detectedPitchEl.textContent = targetNote.name;
            let clamped = Math.max(-25, Math.min(25, avgCents));
            needleEl.style.transform = `translateX(-50%) translateX(${clamped * 4}px)`;
            needleEl.className = "tuner-needle";
            if (avgCents < -10) needleEl.classList.add("needle-flat");
            else if (avgCents > 10) needleEl.classList.add("needle-sharp");
            else needleEl.classList.add("needle-perfect");
            statusLabelEl.textContent = "Holding...";
          },
          onPitchLost: () => {
            centsDisplayEl.textContent = "-- cents";
            centsDisplayEl.style.color = "var(--text-primary)";
            detectedPitchEl.textContent = "--";
            detectedPitchEl.style.color = "var(--text-primary)";
            needleEl.style.transform = `translateX(-50%)`;
            needleEl.className = "tuner-needle";
            statusLabelEl.textContent = "Waiting to play";
          },
          onNoteLocked: (noteIndex, finalCents, score) => {
            const noteElements = document.querySelectorAll(".abcjs-note");
            if (noteElements[noteIndex]) {
              // Hue: Green (in tune) = 120, Red (flat) = ~0, Blue/Purple (sharp) = ~240-280
              // finalCents ranges roughly -25 to +25 for reasonable playing
              let hue = 120 + (finalCents * 4.8);
              hue = Math.max(0, Math.min(280, hue)); // clamp between Red and Purple
              
              const colorStr = `hsl(${hue}, 100%, 65%)`;

              const noteEl = noteElements[noteIndex];
              noteEl.style.fill = colorStr;
              noteEl.style.transition = "fill 0.5s ease";
              
              try {
                const bbox = noteEl.getBBox();
                const svg = document.querySelector("#sheet-music svg");
                if (svg) {
                  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                  text.setAttribute("x", bbox.x + bbox.width / 2);
                  // Position the text about 20px above the highest point of the note bounding box
                  text.setAttribute("y", bbox.y - 15); 
                  text.setAttribute("text-anchor", "middle");
                  text.setAttribute("fill", colorStr);
                  text.setAttribute("font-family", "system-ui, sans-serif");
                  text.setAttribute("font-weight", "bold");
                  text.setAttribute("font-size", "14px");
                  text.textContent = score;
                  svg.appendChild(text);
                }
              } catch(e) {
                console.error("Failed to render note score", e);
              }
            }
          },
          onCompletion: (history) => {
            audioHandler.stop();
            
            const totalScore = history.reduce((sum, item) => sum + item.score, 0);
            const avgScore = Math.round(totalScore / history.length);
            
            let grade = "Fail";
            let gradeColor = "var(--color-flat)";
            if (avgScore >= 90) {
              grade = "High Distinction";
              gradeColor = "var(--color-perfect)";
            } else if (avgScore >= 85) {
              grade = "Distinction";
              gradeColor = "var(--accent-hover)";
            } else if (avgScore >= 80) {
              grade = "Not Bad";
              gradeColor = "var(--text-primary)";
            }

            if (avgScore > personalBest) {
               personalBest = avgScore;
               pbDisplay.textContent = `Best: ${personalBest}%`;
            }

            statusLabelEl.textContent = "Sequence Complete!";
            targetHzEl.textContent = "Done";
            
            centsDisplayEl.textContent = grade;
            centsDisplayEl.style.color = gradeColor;
            
            detectedPitchEl.textContent = `${avgScore}%`;
            detectedPitchEl.style.color = gradeColor;
            
            const currentHzEl = document.getElementById("current-hz-display");
            if (currentHzEl) currentHzEl.textContent = "Overall Score";

            needleEl.style.transform = `translateX(-50%)`;
            needleEl.className = "tuner-needle";
            currentScorer = null;
            
            playAgainContainer.classList.remove("hidden");
          }
        });

        currentScorer.currentIndex = 0;
        currentScorer.ui.onTargetChanged(noteSequence[0]);

      } else {
        micStatus.textContent = "Microphone access denied or error.";
        micStatus.style.color = "var(--color-flat)";
      }
    } // End launchPracticeSession

    playAgainBtn.addEventListener("click", () => {
      // Re-render ABC to clear styling and text overlays
      window.ABCJS.renderAbc("sheet-music", activeAbc, { 
        responsive: "resize", 
        add_classes: true,
        foregroundColor: "#e6edf3"
      });
      
      // Reset texts
      centsDisplayEl.textContent = "-- cents";
      centsDisplayEl.style.color = "var(--text-primary)";
      detectedPitchEl.textContent = "--";
      detectedPitchEl.style.color = "var(--text-primary)";
      const currentHzEl = document.getElementById("current-hz-display");
      if (currentHzEl) currentHzEl.textContent = "Input: -- Hz";
      
      playAgainContainer.classList.add("hidden");
      
      // Stop old context if running, restart audio
      if (audioHandler) audioHandler.stop();
      
      // restart the identical session without rebuilding
      launchPracticeSession(activeAbc, activeNoteSequence, document.getElementById("current-scale-display").textContent);
    });

    backBtn.addEventListener("click", () => {
      if (audioHandler) audioHandler.stop();
      tunerPanel.classList.remove("active");
      setupPanel.classList.add("active");
      currentScorer = null;
    });

    function handlePitchDetection(pitchFreq, clarity, volume) {
      if (volume !== undefined) {
         document.getElementById('volume-level').style.width = Math.min(100, volume * 100) + '%';
      }
      
      if (pitchFreq) {
        currentHzEl.textContent = `Input: ${pitchFreq.toFixed(1)} Hz`;
      } else {
        currentHzEl.textContent = `Input: -- Hz`;
      }

      if (currentScorer && pitchFreq) {
        currentScorer.processPitch(pitchFreq);
      } else if (currentScorer) {
        currentScorer.processPitch(null);
      }
    }
  </script>
</body>
</html>
