<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Propofol Dreams</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-CIefNyvw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-gg3KUo0C.css">
  <link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
  <body style="height: 100dvh;">
    <div id="app" class="app-container" style="height: 100dvh;">
      
      <!-- Top Nav -->
      <div class="top-nav glass-panel" style="padding: 4px 16px;">
        <img src="/brain_tree_logo.png" onerror="this.src='/icon.png'" alt="Propofol Dreams" style="height: 28px; border-radius: 4px;">
        <button id="settings-btn" class="icon-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>

      <!-- Main Results Display Area -->
      <main id="main-content">
        <!-- TCI Results -->
        <div id="tci-view" class="view active fade-in">
          <div class="card glass-card result-card p-0">
            <div class="top-stat-row">
              <span class="label">Initial Bolus:</span>
              <span class="value highlight" id="res-tci-bolus">--</span>
              <span class="unit">mL</span>
            </div>
            <div class="table-container">
              <table id="tci-table">
                <thead>
                  <tr>
                    <th>Time <span class="unit-xs">(hr:m)</span></th>
                    <th class="right-align">Rate <span class="unit-xs">(mL/hr)</span></th>
                  </tr>
                </thead>
                <tbody id="tci-table-body">
                  <!-- JS rows -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

      <!-- Bottom Input Panel in Flex Flow -->
      <div class="bottom-panel glass-panel">
        
        <!-- Target Input AT TOP -->
        <div class="mode-inputs">
          <div class="input-group inline-group" style="margin-bottom: 6px;">
            <div class="target-label-col" style="min-width: 32px; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; margin-right: 8px;">
              <span id="target-label-main" style="font-weight: 700; font-size: 15px;">CeT</span>
              <span id="target-label-unit" class="unit-text" style="font-size: 11px;">(µg/mL)</span>
            </div>
            <div class="stepper lg-stepper" style="flex: 1;">
              <button class="step-btn minus-btn" data-target="shared-target" data-step="0.1">-</button>
              <input type="number" id="shared-target" step="0.1" min="0.1" max="20.0" value="3.0" style="width: 100%; box-sizing: border-box; text-align: center;">
              <button class="step-btn plus-btn" data-target="shared-target" data-step="0.1">+</button>
            </div>
            <div class="target-ebis-col" id="target-ebis-col" style="display: flex; visibility: hidden; flex-direction: column; align-items: center; justify-content: center; padding-left: 12px; min-width: 48px;">
              <span style="font-size: 11px; color: var(--text-muted);">eBIS</span>
              <span id="target-ebis-value" style="font-size: 18px; font-weight: 700; color: #4FC3F7;">-</span>
            </div>
          </div>
        </div>

        <hr class="panel-divider" id="patient-divider">

        <!-- Patient Detail Grid -->
        <div id="patient-grid">
          <button id="btn-minimize-patient" class="minimize-bar-btn" aria-label="Minimize Patient Form">
            <div style="display:flex; gap:96px; align-items:center; opacity:0.9;">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="#aaaaaa" stroke-width="3" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="#aaaaaa" stroke-width="3" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="#aaaaaa" stroke-width="3" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </button>
          
          <div class="inline-group" style="display:flex; margin-top:8px; margin-bottom:8px; gap:8px;">
            <div class="input-group condensed-input drug-select" id="tci-drug-container" style="flex:1;">
              <div class="select-wrapper" style="flex:1;">
              <select id="tci-drug" style="background:transparent; border:none; padding:0; height:100%;">
                <option value="propofol">Propofol</option>
                <option value="remifentanil">Remifentanil</option>
                <option value="dexmedetomidine">Dexmedetomidine</option>
                <option value="remimazolam">Remimazolam</option>
              </select>
            </div>
            </div>
            <button id="btn-reset-patient" class="icon-btn" aria-label="Reset Patient Info" style="background: rgba(255,255,255,0.05); border-radius: 10px; width:48px; border: 1px solid var(--border);">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
            </button>
          </div>

          <div class="patient-grid-layout">
            <div class="sex-toggle" id="sex-toggle">
               <button class="sex-btn active" data-val="Male">M</button>
               <button class="sex-btn" data-val="Female">F</button>
               <input type="hidden" id="pat-sex" value="Male">
            </div>
            
            <div class="condensed-input stepper">
              <button class="step-btn minus-btn" data-target="pat-age" aria-label="Decrease age">-</button>
              <input type="number" id="pat-age" value="40" min="1" max="120">
              <div class="input-unit">yr</div>
              <button class="step-btn plus-btn" data-target="pat-age" aria-label="Increase age">+</button>
            </div>

            <div class="condensed-input stepper">
              <button class="step-btn minus-btn" data-target="pat-weight" aria-label="Decrease weight">-</button>
              <input type="number" id="pat-weight" value="70" min="10" max="300">
              <div class="input-unit" style="width:20px;">kg</div>
              <button class="step-btn plus-btn" data-target="pat-weight" aria-label="Increase weight">+</button>
            </div>

            <div class="condensed-input stepper">
              <button class="step-btn minus-btn" data-target="pat-height" aria-label="Decrease height">-</button>
              <input type="number" id="pat-height" value="170" min="50" max="250">
              <div class="input-unit" style="width:20px;">cm</div>
              <button class="step-btn plus-btn" data-target="pat-height" aria-label="Increase height">+</button>
            </div>
          </div>
        </div>

        <!-- Patient Summary (condensed horizontal strip) -->
        <div id="patient-summary" class="patient-summary bg-elevated" style="display: none;">
          <span id="pat-summary-text"></span>
          <button id="btn-edit-patient" class="icon-btn expand-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </button>
        </div>

      </div>

      <!-- Settings Overlay -->
      <div id="settings-overlay" class="overlay">
        <div class="modal glass-modal">
          <div class="modal-header">
            <h2>Settings</h2>
            <button id="close-settings" class="icon-btn">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="settings-section">
              <h3>Drug Concentrations</h3>
              <div class="input-group inline-group">
                <label>Propofol (mg/mL)</label>
                <div class="select-wrapper inline-select">
                  <select id="set-conc-propofol">
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                  </select>
                </div>
              </div>
              <div class="input-group inline-group">
                <label>Remifentanil (µg/mL)</label>
                <div class="select-wrapper inline-select">
                  <select id="set-conc-remi">
                    <option value="20">20</option>
                    <option value="40">40</option>
                    <option value="50" selected>50</option>
                  </select>
                </div>
              </div>
              <div class="input-group inline-group">
                <label>Dexmedetomidine (µg/mL)</label>
                <div class="select-wrapper inline-select">
                  <select id="set-conc-dex">
                    <option value="4" selected>4</option>
                  </select>
                </div>
              </div>
              <div class="input-group inline-group">
                <label>Remimazolam (mg/mL)</label>
                <div class="select-wrapper inline-select">
                  <select id="set-conc-remimaz">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="settings-section mt-16">
              <h3>System</h3>
              <div class="input-group inline-group">
                <label>Time Step (s)</label>
                <input type="number" id="set-time-step" value="10" min="1" max="60">
              </div>
              <div class="input-group inline-group">
                <label>Max Rate (mL/hr)</label>
                <input type="number" id="set-max-rate" value="1200" min="100" max="9999">
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Time Sync Overlay -->
      <div id="time-overlay" class="overlay">
        <div class="modal glass-modal">
          <div class="modal-header">
            <h2>Set Clock Time</h2>
            <button id="close-time-modal" class="icon-btn">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="modal-body">
            <p style="color:var(--text-muted); font-size:14px; margin-bottom:16px;">Sync infusion time to real-world clock time</p>
            <div class="input-group">
              <input type="time" id="sync-time-input" style="font-size:24px; padding:12px; height:56px; text-align:center; width:100%; box-sizing:border-box;">
            </div>
            <input type="hidden" id="sync-time-row-elapsed">
            <div style="display:flex; justify-content:space-between; margin-top:20px; gap:12px;">
              <button id="btn-clear-time" class="mode-btn" style="background:rgba(255,0,0,0.1); color:#ff6b6b; flex:1;">Clear Sync</button>
              <button id="btn-sync-time" class="mode-btn active" style="flex:1;">Sync Time</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- No Info Overlay needed in TCI Mode currently -->


    <!-- Force Offline Cache Reset & Import main -->
  </body>
</html>
